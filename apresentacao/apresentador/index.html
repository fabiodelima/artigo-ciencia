<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Apresentador — Epistemologia da Construção (Koskela 2017)</title>
  <link rel="icon" href="data:,">
  
  <link rel="stylesheet" href="../tokens.css?v=5">

  <style>
    /* ==========================================================================
       1. TOKENS DE DESIGN & VARIÁVEIS
       Tokens de design vêm de ../tokens.css, gerado a partir do DESIGN.md.
       ========================================================================== */

    /* ==========================================================================
       2. LAYOUT E ESTRUTURA GERAL
       ========================================================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      color: var(--color-ink);
      background-color: var(--color-bg);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ==========================================================================
       3. SIDEBAR DA ESQUERDA — NAVEGAÇÃO DOS SLIDES & WS SYNC
       ========================================================================== */
    .sidebar {
      width: 330px;
      background-color: var(--color-primary-deep);
      color: #FFFFFF;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
      z-index: 10;
    }

    .sidebar-header {
      padding: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .sidebar-header h1 {
      font-family: var(--font-display);
      font-size: var(--font-size-body-lg);
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1.2;
    }

    .sidebar-header p {
      font-size: var(--font-size-caption);
      color: rgba(255,255,255,0.45);
      margin-top: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* WebSocket Connection UI in Sidebar */
    .sync-panel {
      padding: 1rem 1.5rem;
      background-color: var(--color-primary-darkest);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .sync-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: var(--font-size-caption);
    }

    .sync-status {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-weight: 600;
      text-transform: uppercase;
      font-size: var(--font-size-caption);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #cccccc;
      box-shadow: 0 0 8px #cccccc;
      transition: background-color 0.3s;
    }

    .status-dot.connected {
      background-color: #4caf50;
      box-shadow: 0 0 8px #4caf50;
    }

    .status-dot.disconnected {
      background-color: #f44336;
      box-shadow: 0 0 8px #f44336;
    }

    .sync-input-row {
      display: flex;
      gap: 0.4rem;
    }

    .sync-input {
      flex-grow: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      padding: 0.4rem 0.6rem;
      color: #fff;
      font-family: var(--font-body);
      font-size: var(--font-size-small);
      text-align: center;
      letter-spacing: 0.1em;
    }

    .sync-input:focus {
      outline: none;
      border-color: var(--color-accent);
    }

    .sync-btn {
      background: var(--color-accent);
      border: none;
      color: #fff;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      font-weight: 600;
      font-size: var(--font-size-caption);
      cursor: pointer;
      font-family: var(--font-body);
      transition: background 0.2s;
    }

    .sync-btn:hover {
      background: #f76f25;
    }

    .slide-list {
      list-style: none;
      overflow-y: auto;
      flex-grow: 1;
      padding: 0.8rem 0;
    }

    .slide-item {
      padding: 0.8rem 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-left: 4px solid transparent;
      transition: all 0.2s ease;
    }

    .slide-item:hover {
      background-color: rgba(255,255,255,0.03);
    }

    .slide-item.active {
      background-color: rgba(255,255,255,0.06);
      border-left-color: var(--color-accent);
    }

    .slide-info {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .slide-num {
      font-size: var(--font-size-caption);
      font-weight: 700;
      color: var(--color-accent);
      text-transform: uppercase;
    }

    .slide-title-nav {
      font-size: var(--font-size-small);
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 170px;
    }

    .presenter-badge {
      font-size: var(--font-size-caption);
      font-weight: 700;
      text-transform: uppercase;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
    }

    .presenter-badge.fabio {
      background-color: rgba(58, 125, 202, 0.15);
      color: #6fb0fc;
      border: 1px solid rgba(58, 125, 202, 0.3);
    }

    .presenter-badge.arthur {
      background-color: rgba(224, 52, 43, 0.15);
      color: #ff9154;
      border: 1px solid rgba(224, 52, 43, 0.3);
    }

    /* Integrantes do grupo (Seminário Epistemologia) */
    .presenter-badge.louise    { background-color: rgba(224, 52, 43, 0.15);  color: #ff9154; border: 1px solid rgba(224, 52, 43, 0.3); }
    .presenter-badge.piero     { background-color: rgba(30, 90, 224, 0.18); color: #a9c29e; border: 1px solid rgba(30, 90, 224, 0.35); }
    .presenter-badge.franciele { background-color: rgba(140, 82, 159, 0.18); color: #c79bd6; border: 1px solid rgba(140, 82, 159, 0.35); }
    .presenter-badge.pamela    { background-color: rgba(58, 125, 202, 0.15); color: #6fb0fc; border: 1px solid rgba(58, 125, 202, 0.3); }
    .presenter-badge.valentina { background-color: rgba(214, 158, 46, 0.18); color: #e6c86a; border: 1px solid rgba(214, 158, 46, 0.35); }
    .presenter-badge.grupo     { background-color: rgba(255,255,255,0.12);   color: #e8eef5; border: 1px solid rgba(255,255,255,0.2); }

    .sidebar-footer {
      padding: 1.2rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      background-color: var(--color-primary-darkest);
    }

    .btn-presentation {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      background-color: var(--color-primary-mid);
      color: #FFFFFF;
      text-decoration: none;
      padding: 0.65rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: var(--font-size-small);
      border: 1px solid rgba(255,255,255,0.1);
      transition: background-color 0.2s;
    }

    .btn-presentation:hover {
      background-color: var(--color-primary-deep);
    }

    /* ==========================================================================
       4. CONTEÚDO PRINCIPAL — TOPBAR & NAVEGAÇÃO
       ========================================================================== */
    .main-panel {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Topbar de Ações e Segmented Control */
    .topbar {
      height: 70px;
      background-color: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .topbar-title {
      font-family: var(--font-display);
      font-size: var(--font-size-body-lg);
      font-weight: 700;
      color: var(--color-primary-deep);
    }

    /* Segmented Mode Selector Control */
    .mode-selector {
      display: flex;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      padding: 0.2rem;
      border-radius: 8px;
    }

    .mode-btn {
      border: none;
      background: transparent;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      font-family: var(--font-body);
      font-size: var(--font-size-caption);
      font-weight: 600;
      color: var(--color-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-btn.active {
      background: #FFFFFF;
      color: var(--color-primary-deep);
      box-shadow: 0 4px 10px rgba(10, 37, 64, 0.04);
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    /* Sync Override Switch */
    .switch-container {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: var(--font-size-caption);
      font-weight: 600;
      color: var(--color-muted);
      background: var(--color-bg);
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      border: 1px solid var(--color-border);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 20px;
    }

    .switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 20px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: var(--color-accent);
    }

    input:checked + .slider:before {
      transform: translateX(14px);
    }

    .btn-toggle-view {
      background-color: var(--color-bg);
      border: 1px solid var(--color-border);
      color: var(--color-primary-deep);
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: var(--font-size-caption);
      transition: all 0.2s;
    }

    .btn-toggle-view:hover {
      background-color: var(--color-border);
    }

    /* ==========================================================================
       5. ÁREA DE NOTAS E VIEWPORTS DUPLOS
       ========================================================================== */
    .notes-container {
      flex-grow: 1;
      overflow-y: auto;
      padding: 2rem;
    }

    .slide-note-card {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .slide-note-card.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .note-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--color-border);
      padding-bottom: 0.8rem;
    }

    .note-header-left h2 {
      font-family: var(--font-display);
      font-size: var(--font-size-title);
      font-weight: 700;
      color: var(--color-primary-deep);
    }

    .note-header-left p {
      font-size: var(--font-size-small);
      color: var(--color-muted);
      margin-top: 0.2rem;
    }

    .presenter-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      border-radius: 8px;
      font-weight: 700;
      text-transform: uppercase;
      font-size: var(--font-size-caption);
    }

    .presenter-indicator.fabio {
      background-color: var(--color-accent-soft);
      color: var(--color-accent);
      border: 1px solid rgba(224, 52, 43, 0.2);
    }

    .presenter-indicator.arthur {
      background-color: var(--color-surface-alt);
      color: var(--color-primary);
      border: 1px solid rgba(30, 90, 224, 0.2);
    }

    /* MODO ESTUDO VIEWPORT */
    .estudo-viewport {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 2rem;
    }

    /* MODO APRESENTADOR VIEWPORT */
    .apresentador-viewport {
      display: none;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 2rem;
    }

    /* Coluna Esquerda do Modo Estudo: Preview + Timeline */
    .col-preview-timeline {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* Wrapper do Thumbnail do Slide */
    .slide-thumbnail-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* Aspect Ratio 16/9 */
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--color-border);
      box-shadow: 0 4px 15px rgba(10, 37, 64, 0.04);
      background-color: var(--color-primary-deep);
      flex-shrink: 0;
      margin: 0 auto 1.5rem auto;
    }

    .slide-thumbnail-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 1920px;
      height: 1080px;
      border: none;
      transform: scale(0.25);
      transform-origin: top left;
      pointer-events: none;
    }

    /* Timeline de Ações Sequenciais (Steps) */
    .timeline-container {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 4px 20px rgba(10, 37, 64, 0.01);
    }

    .timeline-title {
      font-size: var(--font-size-caption);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-accent);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .timeline {
      position: relative;
      padding-left: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 5px;
      top: 5px;
      bottom: 5px;
      width: 2px;
      background: var(--color-border);
    }

    .timeline-node {
      position: relative;
      transition: all 0.3s;
    }

    .timeline-bullet {
      position: absolute;
      left: -1.5rem;
      top: 4px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--color-bg);
      border: 2px solid var(--color-muted);
      transition: all 0.3s;
      z-index: 2;
    }

    .timeline-node.active .timeline-bullet {
      background: var(--color-accent);
      border-color: var(--color-accent);
      box-shadow: 0 0 8px rgba(224, 52, 43, 0.5);
    }

    .timeline-content {
      background: var(--color-bg);
      border-radius: 8px;
      padding: 0.8rem 1rem;
      border: 1px solid transparent;
      transition: all 0.3s;
    }

    .timeline-node.active .timeline-content {
      background: #FFFFFF;
      border-color: rgba(224, 52, 43, 0.15);
      box-shadow: 0 4px 15px rgba(224, 52, 43, 0.03);
    }

    .step-tag {
      font-size: var(--font-size-caption);
      font-weight: 700;
      text-transform: uppercase;
      color: var(--color-muted);
      letter-spacing: 0.05em;
    }

    .timeline-node.active .step-tag {
      color: var(--color-accent);
    }

    .step-desc {
      font-size: var(--font-size-small);
      font-weight: 600;
      color: var(--color-primary-deep);
      margin-top: 0.1rem;
    }

    .step-speech {
      font-size: var(--font-size-small);
      font-style: italic;
      color: var(--color-ink);
      margin-top: 0.4rem;
      border-left: 2px solid var(--color-accent);
      padding-left: 0.6rem;
      line-height: 1.4;
    }

    /* Coluna Direita do Modo Estudo: Destrinchando + Referências */
    .col-destrinchando {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .destrinchando-box {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 1.8rem;
      box-shadow: 0 4px 25px rgba(10, 37, 64, 0.01);
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .destrinchando-title {
      font-family: var(--font-display);
      font-size: var(--font-size-body-lg);
      font-weight: 600;
      color: var(--color-primary-deep);
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 0.5rem;
      margin-bottom: 0.2rem;
    }

    .destrinchando-section {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .destrinchando-section h4 {
      font-size: var(--font-size-caption);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-primary);
    }

    .destrinchando-text {
      font-size: var(--font-size-small);
      line-height: 1.5;
      color: var(--color-primary-deep);
    }

    /* Localizador de Referências UI Block */
    .localizador-box {
      background: var(--color-surface-alt);
      border: 1px solid rgba(30, 90, 224, 0.14);
      border-radius: var(--radius-control);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
    }

    .localizador-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ref-title {
      font-size: var(--font-size-caption);
      font-weight: 700;
      text-transform: uppercase;
      color: var(--color-primary);
    }

    .ref-page {
      font-size: var(--font-size-caption);
      font-weight: 700;
      color: var(--color-primary-deep);
      background: rgba(30, 90, 224, 0.12);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
    }



    .btn-pdf-drawer-trigger {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      background: var(--color-primary);
      color: #fff;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: var(--font-size-caption);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
      margin-top: 0.2rem;
    }

    .btn-pdf-drawer-trigger:hover {
      background: var(--color-primary-deep);
    }

    /* MODO APRESENTADOR VIEWPORT LAYOUT */
    .col-speech-active {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* Card Central do Talking Point Ativo */
    .active-talking-point-card {
      background: linear-gradient(180deg, rgba(224, 52, 43, 0.05) 0%, #FFFFFF 100%);
      border: 1px solid rgba(224, 52, 43, 0.16);
      border-radius: var(--radius-card);
      padding: 2.2rem;
      box-shadow: 0 10px 40px rgba(224, 52, 43, 0.05);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .active-talking-point-card .card-label {
      font-size: var(--font-size-caption);
      font-weight: 700;
      color: var(--color-accent);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .active-talking-point-card .tp-text {
      font-family: var(--font-display);
      font-size: var(--font-size-title);
      line-height: 1.45;
      font-weight: 600;
      color: var(--color-primary-deep);
      font-style: italic;
    }

    /* Lista Geral de Talking Points Escaneáveis */
    .talking-points-list-box {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 1.8rem;
      box-shadow: 0 4px 20px rgba(10, 37, 64, 0.01);
    }

    .tp-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1rem;
    }

    .tp-item {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      font-size: var(--font-size-body);
      line-height: 1.5;
      color: var(--color-primary-deep);
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      border-left: 3px solid transparent;
      transition: all 0.2s;
    }

    .tp-item.active {
      background: var(--color-accent-soft);
      border-left-color: var(--color-accent);
      font-weight: 600;
    }

    .tp-bullet {
      color: var(--color-accent);
      font-size: var(--font-size-body-lg);
      line-height: 1;
      margin-top: -0.1rem;
    }

    /* Coluna da Direita do Modo Apresentador: Cronômetro + Notas Auxiliares */
    .col-timer-meta {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* Widget do Cronômetro Circular */
    .timer-widget {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(10, 37, 64, 0.01);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .timer-container {
      position: relative;
      width: 140px;
      height: 140px;
    }

    .timer-svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .timer-bg {
      fill: none;
      stroke: var(--color-bg);
      stroke-width: 8;
    }

    .timer-progress {
      fill: none;
      stroke: #4caf50; /* Começa verde */
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 377;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.5s;
    }

    .timer-text-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .timer-time {
      font-size: var(--font-size-title);
      font-weight: 700;
      color: var(--color-primary-deep);

        refName: "Koskela et al. (2017) — Conclusão",
        refPage: "Pág. 7",
        refSearch: "balance",
        refFile: "Koskela_2017_Epistemology.pdf",
        steps: [
          { desc: "A balança (síntese)", speech: "A proposta não é abandonar Platão. A dedução teórica é essencial no design conceitual." },
          { desc: "Trazer o aristotelismo", speech: "Mas é urgente reequilibrar com o aristotelismo: produção real, combate ao desperdício, ciclos de aprendizado rápidos." },
          { desc: "Reforma educacional", speech: "E a alavanca de longo prazo é a educação: trazer Filosofia da Ciência e Epistemologia para os currículos de engenharia e gestão." }
        ]
      },
      {
        index: 9,
        num: "Slide 10",
        title: "Discussão Crítica & Fechamento",
        speaker: "Grupo",
        objective: "Abrir a discussão com três perguntas provocativas e fechar com a referência bibliográfica.",
        facts: `<strong>Perguntas para a sala:</strong><br>
        1) Quão viável é mudar currículos de engenharia hoje?<br>
        2) Lean Construction e BIM integrado conseguem unir o design conceitual (Platão) à produção colaborativa (Aristóteles)?<br>
        3) O ensino da nossa universidade é puramente platônico?`,
        theory: `<strong>Ponte prática:</strong> Lean Construction e BIM integrado são tentativas concretas de unir o design conceitual à produção colaborativa — exatamente o equilíbrio que o artigo defende.`,
        refName: "Koskela et al. (2017) — Artigo integral",
        refPage: "Pág. 1",
        refSearch: "conclusion",
        refFile: "Koskela_2017_Epistemology.pdf",
        steps: [
          { desc: "Pergunta 1 (currículos)", speech: "Fechamos abrindo o debate. Primeiro: quão viável é, de fato, mudar os currículos de engenharia hoje?" },
          { desc: "Pergunta 2 (Lean/BIM)", speech: "Segundo: Lean Construction e BIM integrado dão conta de unir o mundo de Platão ao de Aristóteles?" },
          { desc: "Pergunta 3 (nossa universidade)", speech: "E, por fim: o ensino da nossa própria universidade é puramente platônico? Obrigado — vamos ao debate." }
        ]
      }
    ];

    document.addEventListener('DOMContentLoaded', () => {
      const sidebarSlideList = document.getElementById('sidebarSlideList');
      const slideNotesCards = document.getElementById('slideNotesCards');
      const gridViewContainer = document.getElementById('gridViewContainer');
      
      const btnModeEstudo = document.getElementById('btnModeEstudo');
      const btnModeApresentador = document.getElementById('btnModeApresentador');
      const btnToggleView = document.getElementById('btnToggleView');
      const syncSwitch = document.getElementById('syncSwitch');
      
      const btnPrevSlide = document.getElementById('btnPrevSlide');
      const btnNextSlide = document.getElementById('btnNextSlide');
      const navProgress = document.getElementById('navProgress');
      const notesContainer = document.getElementById('notesContainer');
      const footerControls = document.getElementById('footerControls');
      
      const pdfDrawer = document.getElementById('pdfDrawer');
      const pdfDrawerTitle = document.getElementById('pdfDrawerTitle');
      const pdfDrawerIframe = document.getElementById('pdfDrawerIframe');
      const btnCloseDrawer = document.getElementById('btnCloseDrawer');

      let currentIndex = 0;
      let isGridView = false;
      let activeMode = 'estudo'; // 'estudo' | 'apresentador'

      // ── SYSTEM STATE & WEBSOCKET SYNC ────────────────────────────────────────
      const WS_URL = (() => {
        const explicit = new URLSearchParams(window.location.search).get('ws');
        if (explicit) return explicit;

        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        return `${protocol}//${window.location.host}`;
      })();
      let wsClient = null;
      let currentRoomCode = '';

      const wsDot = document.getElementById('wsDot');
      const wsStatusText = document.getElementById('wsStatusText');
      const wsInput = document.getElementById('wsInput');
      const wsBtnConnect = document.getElementById('wsBtnConnect');

      function connectWebSocket(roomCode) {
        if (!roomCode) return;
        currentRoomCode = roomCode;

        wsStatusText.textContent = "Conectando...";
        wsDot.className = "status-dot";

        if (wsClient) {
          wsClient.close();
        }

        try {
          wsClient = new WebSocket(WS_URL);
        } catch (e) {
          console.warn('[WS] Erro ao instanciar WebSocket:', e);
          return;
        }

        wsClient.onopen = () => {
          wsDot.className = "status-dot connected";
          wsStatusText.textContent = `Sala: ${roomCode}`;
          // Registra como remote para receber atualizações do Host da apresentação
          wsClient.send(JSON.stringify({ type: 'register', sessionId: roomCode, role: 'remote' }));
          localStorage.setItem('ws_room_code', roomCode);
        };

        wsClient.onmessage = (event) => {
          let data;
          try { data = JSON.parse(event.data); } catch { return; }

          // Se a sincronização estiver ativada, segue o slide e step do Host da apresentação
          if (data.type === 'state-update' && syncSwitch.checked) {
            const slideIdx = parseInt(data.slideIndex, 10);
            const stepIdx = parseInt(data.stepIndex, 10);

            if (slideIdx !== currentIndex) {
              showSlide(slideIdx);
            }
            highlightStep(slideIdx, stepIdx);
          }
        };

        wsClient.onclose = () => {
          wsDot.className = "status-dot disconnected";
          wsStatusText.textContent = "Off-line";
        };

        wsClient.onerror = () => {
          wsDot.className = "status-dot disconnected";
          wsStatusText.textContent = "Erro WS";
        };
      }

      wsBtnConnect.addEventListener('click', () => {
        const code = wsInput.value.trim();
        if (code.length === 4) {
          connectRemoteSession(code);
        } else {
          alert('Por favor, insira um código de 4 dígitos válido.');
        }
      });

      function connectRemoteSession(code) {
        connectWebSocket(code);
      }

      // Restaura última conexão bem-sucedida se houver
      const savedRoom = localStorage.getItem('ws_room_code');
      if (savedRoom) {
        wsInput.value = savedRoom;
        connectWebSocket(savedRoom);
      }

      // ── CONSTRUIR CARDS E BARRA LATERAL DINAMICAMENTE ───────────────────────
      function buildInterface() {
        sidebarSlideList.innerHTML = '';
        slideNotesCards.innerHTML = '';

        SLIDES_DATA.forEach((slide, i) => {
          const presenterClass = slide.speaker.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
          const slideNumStr = String(i + 1).padStart(2, '0');

          // 1. Sidebar Item
          const sideLi = document.createElement('li');
          sideLi.className = `slide-item ${i === 0 ? 'active' : ''}`;
          sideLi.dataset.index = i;
          sideLi.innerHTML = `
            <div class="slide-info">
              <span class="slide-num">${slide.num}</span>
              <span class="slide-title-nav">${slide.title}</span>
            </div>
            <span class="presenter-badge ${presenterClass}">${slide.speaker}</span>
          `;
          sidebarSlideList.appendChild(sideLi);

          // 2. Slide Main Card
          const cardArticle = document.createElement('article');
          cardArticle.className = `slide-note-card ${i === 0 ? 'active' : ''}`;
          cardArticle.dataset.slide = i;

          // Construir a Timeline de Steps
          let timelineHtml = '';
          slide.steps.forEach((step, stepIdx) => {
            const stepNum = stepIdx + 1;
            timelineHtml += `
              <div class="timeline-node" data-step-node="${stepNum}">
                <div class="timeline-bullet"></div>
                <div class="timeline-content">
                  <div class="step-header-row" style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="step-tag">Ação ${stepNum}</span>
                    <button class="btn-pdf-drawer-trigger" style="margin:0; padding:0.15rem 0.4rem; font-size:var(--font-size-caption);" onclick="openPdf('${slide.refFile}', '${slide.refSearch}', ${i}, '${slide.refPage}')">
                      📄 Citação
                    </button>
                  </div>
                  <p class="step-desc">${step.desc}</p>
                  <p class="step-speech">"${step.speech}"</p>
                </div>
              </div>
            `;
          });

          // Construir Lista de Talking Points para o Modo Apresentador
          let talkingPointsListHtml = '';
          slide.steps.forEach((step, stepIdx) => {
            talkingPointsListHtml += `
              <li class="tp-item" data-tp-item="${stepIdx + 1}">
                <span class="tp-bullet">▪</span>
                <span>${step.desc}: <strong>${step.speech.replace(/"/g, '')}</strong></span>
              </li>
            `;
          });

          cardArticle.innerHTML = `
            <div class="note-header">
              <div class="note-header-left">
                <h2>${slideNumStr} · ${slide.title}</h2>
                <p>Responsável Principal: ${slide.speaker}</p>
              </div>
              <div class="presenter-indicator ${presenterClass}">${slide.speaker}</div>
            </div>

            <!-- VIEWPORT 1: MODO ESTUDO -->
            <div class="estudo-viewport" id="estudo-${i}">
              <div class="col-preview-timeline">
                <div class="slide-thumbnail-wrapper">
                  <iframe data-src="../index.html?presenter=true#slide-${slideNumStr}"></iframe>
                </div>
                <div class="timeline-container">
                  <span class="timeline-title">🎯 Timeline de Revelação & Speech</span>
                  <div class="timeline">
                    ${timelineHtml}
                  </div>
                </div>
              </div>
              <div class="col-destrinchando">
                <div class="destrinchando-box">
                  <h3 class="destrinchando-title">Destrinchando o Slide</h3>
                  <div class="destrinchando-section">
                    <h4>🍇 Fatos do Caso (Empírico)</h4>
                    <div class="destrinchando-text">${slide.facts}</div>
                  </div>
                  <div class="destrinchando-section">
                    <h4>💡 Teoria Acadêmica (Mestrado)</h4>
                    <div class="destrinchando-text">${slide.theory}</div>
                  </div>
                </div>
                <div class="localizador-box">
                  <div class="localizador-header">
                    <span class="ref-title">📖 Localizador de Referências</span>
                    <span class="ref-page">${slide.refPage}</span>
                  </div>
                  <p class="destrinchando-text" style="font-size:var(--font-size-small); font-weight:600; margin-bottom: 0.8rem;">Artigo: ${slide.refName}</p>
                  <button class="btn-pdf-drawer-trigger" onclick="openPdf('${slide.refFile}', '${slide.refSearch}', ${i}, '${slide.refPage}')">
                    📚 Abrir PDF Integrado (${slide.refPage})
                  </button>
                </div>
              </div>
            </div>

            <!-- VIEWPORT 2: MODO APRESENTADOR -->
            <div class="apresentador-viewport" id="apresentador-${i}">
              <div class="col-speech-active">
                <div class="active-talking-point-card">
                  <span class="card-label">Talking Point Ativo</span>
                  <p class="tp-text" id="activeSpeech-${i}">Aguardando ação sequencial...</p>
                </div>
                <div class="talking-points-list-box">
                  <span class="timeline-title">📋 Roteiro de Apoio Escaneável</span>
                  <ul class="tp-list">
                    ${talkingPointsListHtml}
                  </ul>
                </div>
              </div>
              <div class="col-timer-meta">
                <!-- Widget do Cronômetro Circular -->
                <div class="timer-widget">
                  <span class="timeline-title" style="margin-bottom:0.5rem;">⏱️ Controle de Tempo</span>
                  <div class="timer-container">
                    <svg class="timer-svg">
                      <circle class="timer-bg" cx="70" cy="70" r="60"/>
                      <circle class="timer-progress" id="circleProgress-${i}" cx="70" cy="70" r="60"/>
                    </svg>
                    <div class="timer-text-overlay">
                      <span class="timer-time" id="timerDisplay-${i}">15:00</span>
                      <span class="timer-label">Restantes</span>
                    </div>
                  </div>
                  <div class="timer-controls">
                    <button class="timer-btn" onclick="toggleTimer()">Iniciar / Pausar</button>
                    <button class="timer-btn" onclick="resetTimer()">Zerar</button>
                  </div>
                </div>
                <div class="destrinchando-box" style="padding:1.2rem; background: var(--color-bg);">
                  <span class="timeline-title" style="color:var(--color-primary); margin-bottom:0.6rem;">🎯 Objetivo Técnico do Slide</span>
                  <p style="font-size:var(--font-size-small); line-height:1.45; color:var(--color-primary-deep);">${slide.objective}</p>
                </div>
              </div>
            </div>
          `;
          slideNotesCards.appendChild(cardArticle);
        });
      }

      buildInterface();

      const slideItems = Array.from(document.querySelectorAll('.slide-item'));
      const noteCards = Array.from(document.querySelectorAll('.slide-note-card'));

      // ── ATUALIZAR INTERFACE E SLIDES ───────────────────────────────────────
      let currentStepIndex = 1;

      function updateNavProgress() {
        navProgress.textContent = `Slide ${currentIndex + 1} de ${SLIDES_DATA.length}`;
      }

      function showSlide(index) {
        currentIndex = index;
        currentStepIndex = 1;

        // Atualizar sidebar
        slideItems.forEach((item, i) => {
          item.classList.toggle('active', i === index);
        });

        // Atualizar Note Card e Lazy Loading de Iframes
        noteCards.forEach((card, i) => {
          const isActive = i === index;
          card.classList.toggle('active', isActive);

          if (isActive) {
            // Lazy load do iframe do slide
            const iframe = card.querySelector('.slide-thumbnail-wrapper iframe[data-src]');
            if (iframe) {
              iframe.src = iframe.dataset.src;
              iframe.removeAttribute('data-src');
            }

            // Exibir a viewport correta de acordo com o modo ativo
            const estudoViewport = card.querySelector('.estudo-viewport');
            const apresentadorViewport = card.querySelector('.apresentador-viewport');
            if (estudoViewport && apresentadorViewport) {
              estudoViewport.style.display = activeMode === 'estudo' ? 'grid' : 'none';
              apresentadorViewport.style.display = activeMode === 'apresentador' ? 'grid' : 'none';
            }
          }
        });

        // Configurar rodapé
        btnPrevSlide.disabled = index === 0;
        btnNextSlide.disabled = index === slideItems.length - 1;
        notesContainer.scrollTop = 0;

        // Se Sincronizar estiver ativado e conectado via WS, envia comando para a apresentação seguir o slide
        if (wsClient && wsClient.readyState === WebSocket.OPEN && syncSwitch.checked) {
          wsClient.send(JSON.stringify({
            type: 'command',
            action: 'goto',
            slideIndex: index
          }));
        }

        // Reseta o realce de passos para o padrão
        highlightStep(index, 1);
        setTimeout(scaleThumbnails, 50);
      }

      // Avança de slide
      window.nextStep = function() {
        if (currentIndex < SLIDES_DATA.length - 1) {
          showSlide(currentIndex + 1);
        }
      };

      // Retrocede de slide
      window.prevStep = function() {
        if (currentIndex > 0) {
          showSlide(currentIndex - 1);
        }
      };

      // Destaca os steps na timeline
      function highlightStep(slideIdx, stepIdx) {
        const card = noteCards[slideIdx];
        if (!card) return;

        // 1. Destacar Timeline de Ações (tudo visível)
        const timelineNodes = Array.from(card.querySelectorAll('.timeline-node'));
        timelineNodes.forEach((node, i) => {
          node.classList.add('active');
        });

        // 2. Destacar Talking Points no Modo Apresentador (tudo visível)
        const tpItems = Array.from(card.querySelectorAll('.tp-item'));
        tpItems.forEach((item, i) => {
          item.classList.add('active');
        });

        // 3. Atualizar o Card de Talking Point Ativo com o roteiro de fala completo
        const activeSpeechText = card.querySelector('.tp-text');
        if (activeSpeechText) {
          const stepsData = SLIDES_DATA[slideIdx].steps;
          const fullSpeech = stepsData.map(s => s.speech).join('<br><br>');
          activeSpeechText.innerHTML = `"${fullSpeech}"`;
        }

        updateNavProgress();
      }

      // Clique na sidebar
      slideItems.forEach(item => {
        item.addEventListener('click', () => {
          if (isGridView) toggleGridView();
          const index = parseInt(item.dataset.index, 10);
          showSlide(index);
        });
      });

      // Navegação por rodapé (Slides)
      btnPrevSlide.addEventListener('click', () => {
        if (currentIndex > 0) showSlide(currentIndex - 1);
      });

      btnNextSlide.addEventListener('click', () => {
        if (currentIndex < slideItems.length - 1) showSlide(currentIndex + 1);
      });

      // ── CONVERSÃO DE MODOS (ESTUDO E APRESENTADOR) ──────────────────────────
      btnModeEstudo.addEventListener('click', () => {
        activeMode = 'estudo';
        btnModeEstudo.classList.add('active');
        btnModeApresentador.classList.remove('active');
        showSlide(currentIndex);
      });

      btnModeApresentador.addEventListener('click', () => {
        activeMode = 'apresentador';
        btnModeApresentador.classList.add('active');
        btnModeEstudo.classList.remove('active');
        showSlide(currentIndex);
      });

      // Atalhos de teclado (Slides)
      document.addEventListener('keydown', (e) => {
        if (isGridView) return;
        if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'ArrowDown' || e.key === 'PageDown') {
          e.preventDefault();
          nextStep();
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') {
          e.preventDefault();
          prevStep();
        }
      });

      // ── MODO GRID (VISTA COMPLETA) ──────────────────────────────────────────
      function toggleGridView() {
        isGridView = !isGridView;

        if (isGridView) {
          btnToggleView.textContent = "🎴 Modo Console";
          footerControls.style.display = "none";
          noteCards.forEach(card => card.classList.remove('active'));
          gridViewContainer.classList.add('active');
          
          gridViewContainer.innerHTML = '';
          SLIDES_DATA.forEach((slide, i) => {
            const presenterClass = slide.speaker.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
            const slideNumStr = String(i + 1).padStart(2, '0');

            const cardEl = document.createElement('div');
            cardEl.className = `grid-card ${presenterClass}`;
            
            cardEl.innerHTML = `
              <div class="grid-card-header">
                <span class="slide-num">${slide.num}</span>
                <span class="grid-card-title">${slide.title}</span>
                <span class="presenter-badge ${presenterClass}">${slide.speaker}</span>
              </div>
              <div class="estudo-viewport" style="display:grid;">
                <div class="col-preview-timeline">
                  <div class="slide-thumbnail-wrapper">
                    <iframe data-src="../index.html?presenter=true#slide-${slideNumStr}"></iframe>
                  </div>
                </div>
                <div class="col-destrinchando">
                  <div class="destrinchando-box" style="padding:1.2rem;">
                    <div class="destrinchando-section">
                      <h4>🍇 Fatos do Caso</h4>
                      <div class="destrinchando-text" style="font-size:var(--font-size-small);">${slide.facts}</div>
                    </div>
                    <div class="destrinchando-section" style="margin-top:0.6rem;">
                      <h4>💡 Teoria Embasadora</h4>
                      <div class="destrinchando-text" style="font-size:var(--font-size-small);">${slide.theory}</div>
                    </div>
                  </div>
                </div>
              </div>
            `;
            
            const origIframe = cardEl.querySelector('.slide-thumbnail-wrapper iframe');
            if (origIframe) {
              origIframe.src = origIframe.dataset.src;
              origIframe.removeAttribute('data-src');
            }

            gridViewContainer.appendChild(cardEl);
          });
          setTimeout(scaleThumbnails, 50);
        } else {
          btnToggleView.textContent = "🎴 Vista Completa (Grid)";
          footerControls.style.display = "flex";
          gridViewContainer.classList.remove('active');
          showSlide(currentIndex);
        }
      }

      btnToggleView.addEventListener('click', toggleGridView);

      // ── CRONÔMETRO INTERATIVO HSL ───────────────────────────────────────────
      let timerInterval = null;
      let totalSeconds = 15 * 60; // 15 Minutos limite

      window.toggleTimer = function() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        } else {
          timerInterval = setInterval(updateTimerTick, 1000);
        }
      };

      window.resetTimer = function() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        totalSeconds = 15 * 60;
        updateTimerDisplay();
      };

      function updateTimerTick() {
        if (totalSeconds > 0) {
          totalSeconds--;
          updateTimerDisplay();
        } else {
          clearInterval(timerInterval);
          timerInterval = null;
          alert('Tempo esgotado da apresentação oral de 15 minutos!');
        }
      }

      function updateTimerDisplay() {
        const mins = Math.floor(totalSeconds / 60);
        const secs = totalSeconds % 60;
        const formatted = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

        // Atualizar todos os displays de cronômetros dos cards
        SLIDES_DATA.forEach((_, idx) => {
          const displayEl = document.getElementById(`timerDisplay-${idx}`);
          if (displayEl) displayEl.textContent = formatted;

          const progressCircle = document.getElementById(`circleProgress-${idx}`);
          if (progressCircle) {
            // Circunferência = 2 * PI * r = 2 * 3.1416 * 60 ≈ 377
            const totalLimit = 15 * 60;
            const fraction = totalSeconds / totalLimit;
            const offset = 377 - (377 * fraction);
            progressCircle.style.strokeDashoffset = offset;

            // Mudança de cor gradual HSL (Verde -> Laranja -> Vermelho)
            if (totalSeconds > 5 * 60) {
              progressCircle.style.stroke = "#4caf50"; // Verde (> 5 min)
            } else if (totalSeconds <= 5 * 60 && totalSeconds > 2 * 60) {
              progressCircle.style.stroke = "#ff9800"; // Laranja (2 a 5 min)
            } else {
              progressCircle.style.stroke = "#f44336"; // Vermelho (< 2 min)
            }
          }
        });
      }

      // ── LOCALIZADOR DE PDF & DRAWER CONTROL ────────────────────────────────
      window.openPdf = function(fileName, searchPhrase, slideIdx, pageStr) {
        let pageNum = 1;
        const pageMatch = pageStr.match(/\d+/);
        if (pageMatch) {
          pageNum = parseInt(pageMatch[0], 10);
        }

        const pdfPath = `../material/${fileName}#page=${pageNum}`;
        
        pdfDrawerIframe.src = pdfPath;
        pdfDrawerTitle.textContent = fileName.split('_').slice(3).join(' ').replace('.pdf', '');
        pdfDrawerSub.textContent = `Pág. ${pageNum}`;
        
        pdfDrawer.classList.add('open');
      };

      btnCloseDrawer.addEventListener('click', () => {
        pdfDrawer.classList.remove('open');
        pdfDrawerIframe.src = "about:blank"; // Limpa iframe para parar rendering
      });

      // Função matemática para redimensionar as miniaturas em tempo real mantendo proporção ideal
      function scaleThumbnails() {
        const wrappers = document.querySelectorAll('.slide-thumbnail-wrapper');
        wrappers.forEach(wrapper => {
          const width = wrapper.getBoundingClientRect().width;
          const scale = width / 1920;
          const iframe = wrapper.querySelector('iframe');
          if (iframe) {
            iframe.style.transform = `scale(${scale})`;
          }
        });
      }

      window.addEventListener('resize', scaleThumbnails);

      // Inicialização
      showSlide(0);
    });
  </script>
</body>
</html>
